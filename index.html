
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Antonella 🌻</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #fff9e6; 
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 45px rgba(214, 184, 0, 0.2); 
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 3px solid #ffeb3b;
        }

        h1 {
            color: #b38b00;
            margin-bottom: 10px;
            font-size: 2.8rem;
            font-family: 'Dancing Script', cursive;
        }

        .foto-graffiti {
            width: 110%;
            margin-left: -5%;
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(255, 87, 34, 0.5));
            animation: glow 2s infinite alternate ease-in-out;
        }

        .foto-flores {
            width: 100%;
            border-radius: 20px;
            margin-top: -15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            filter: drop-shadow(0 0 12px rgba(255, 235, 59, 0.4));
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(255, 87, 34, 0.4)); transform: scale(1); }
            to { filter: drop-shadow(0 0 20px rgba(255, 87, 34, 0.8)); transform: scale(1.03); }
        }

        .mensaje {
            color: #7a631d;
            font-weight: 500;
            margin: 25px 0;
            font-size: 1.1rem;
            line-height: 1.5;
            font-style: italic;
        }

        .spotify-frame {
            margin-top: 10px;
            border-radius: 15px;
            overflow: hidden;
            background-color: #282828; /* Fondo oscuro mientras carga */
            height: 80px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Antonella TE AMO</h1>

        <img src="graffiti.png" alt="Graffiti" class="foto-graffiti">

        <img src="flores.jpg" alt="Flores Amarillas" class="foto-flores">

        <p class="mensaje">"Sé que hay mil razones por las que no podemos estar juntos, pero te equivocas."</p>

        <div class="spotify-frame">
            <iframe style="border-radius:12px" 
                src="http://googleusercontent.com/spotify.com/7" 
                width="100%" height="80" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>
    </div>

</body>
</html>
